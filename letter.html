<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kanak 💌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .envelope {
            position: relative;
            width: 90%;
            max-width: 500px;
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(100px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .seal {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
            z-index: 10;
        }

        .seal::after {
            content: '💌';
            font-size: 28px;
        }

        .letter-content {
            text-align: center;
            padding-top: 20px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: #e74c3c;
            margin-bottom: 5px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .line {
            width: 80px;
            height: 2px;
            background: #e74c3c;
            margin: 10px auto;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .message {
            font-size: 1rem;
            color: #444;
            line-height: 1.8;
            font-style: italic;
            margin: 20px 0;
            animation: fadeIn 1s ease-out 0.5s both;
            text-align: left;
            padding: 0 10px;
        }

        .message p {
            margin: 12px 0;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: #e74c3c;
            margin-top: 15px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
            animation: fadeIn 1s ease-out 0.7s both;
            padding-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: white;
            color: #e74c3c;
            border: 2px solid #e74c3c;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }

        .btn:hover {
            background: #e74c3c;
            color: white;
            transform: scale(1.05);
        }

        .btn-nahi {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-nahi:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Floating hearts */
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: float 6s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(100vh) rotate(0deg); 
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-100px) rotate(360deg); 
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Floating hearts background -->
    <div class="hearts" id="hearts"></div>

    <!-- Main envelope card -->
    <div class="envelope">
        <div class="seal"></div>
        
        <div class="letter-content">
            <h1> Kanak 💕</h1>
            <div class="line"></div>
            
            <div class="message">
                <p>I'm really sorry for everything I said or did that hurt you. </p>
                
                <p>Tum kabhi toh bina gussa ke baat karo.</p>
                
                <p>Please forgive me once more. I promise I'll try my best not to repeat my mistakes.</p>
                
                <p>Aur haan, Thank you so much Kanak! maaf karne ke liye 
                  ~~~Avanish❤️</p>
            </div>
            
            <div class="signature">
                -😭💖
            </div>
            
            <div class="buttons-container" id="buttons">
                <a href="#" class="btn" onclick="forgive()">Thik h ❤️</a>
                <a href="#" class="btn btn-nahi" id="nahiBtn" onmouseover="runAway()">Nahi 😢</a>
            </div>
        </div>
    </div>

    <script>
        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            const heartSymbols = ['❤️', '💕', '💖', '💗', '😍', '🥺'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.fontSize = (15 + Math.random() * 20) + 'px';
                    heart.style.animationDuration = (4 + Math.random() * 4) + 's';
                    heart.style.animationDelay = Math.random() * 2 + 's';
                    heartsContainer.appendChild(heart);
                }, i * 300);
            }
        }

        // Run away when mouse over "nahi"
        function runAway() {
            const btn = document.getElementById('nahiBtn');
            const container = document.getElementById('buttons');
            const containerRect = container.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            
            // Calculate random new position
            const maxX = containerRect.width - btnRect.width;
            const maxY = containerRect.height - btnRect.height;
            
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;
            
            btn.style.position = 'relative';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        // Forgive button action
        function forgive() {
            const buttons = document.getElementById('buttons');
            const content = document.querySelector('.letter-content');
            
            buttons.innerHTML = '<h2 style="color:#e74c3c; font-family:Great Vibes cursive; font-size:2.5rem; color:#e74c3c; animation:fadeIn 0.5s ease-out;">Thank you so much! Kanak 💕🥰</h2>';
        }

        // Initialize
        createHearts();
    </script>
</body>
</html>
